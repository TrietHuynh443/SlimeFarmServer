services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-service-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PUBLIC_PORT}:${POSTGRES_INTERNAL_PORT}"
    volumes:
      - ${POSTGRES_VOLUME}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-service-api
    environment:
      PORT: ${API_INTERNAL_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_INTERNAL_PORT}/${POSTGRES_DB}?sslmode=disable
    ports:
      - "${API_PUBLIC_PORT}:${API_INTERNAL_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["/go/bin/air", "-c", ".air.toml"]

volumes:
  pgdata:
  go-mod-cache:
  go-build-cache:
