version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/db/query"
    gen:
      go:
        package: "dbgen"
        out: "internal/db/dbgen"
        sql_package: "pgx/v5"
        overrides:
          - column: "configs.value"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
        
